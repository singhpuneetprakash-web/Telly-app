<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tally — Daily Counter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e85d4a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tally">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1a2e;--ink-soft:#4a4a6a;--bg:#f7f5f0;--card:#fff;--accent:#e85d4a;--accent-light:#fff0ee;--gold:#f0a500;--border:#e8e4dc;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100dvh;padding:24px 16px 60px;background-image:radial-gradient(circle at 20% 10%,rgba(232,93,74,.06) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(74,127,232,.06) 0%,transparent 50%);-webkit-tap-highlight-color:transparent;user-select:none;}
header{text-align:center;margin-bottom:28px;animation:fadeDown .5s ease both;}
header h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,5vw,2.8rem);color:var(--ink);}
header p{font-size:.85rem;color:var(--ink-soft);margin-top:4px;font-weight:300;letter-spacing:.5px;text-transform:uppercase;}
.card{background:var(--card);border-radius:24px;padding:32px 24px;box-shadow:0 4px 24px rgba(26,26,46,.08);max-width:420px;margin:0 auto 20px;border:1px solid var(--border);animation:fadeUp .5s ease both;}
.counter-card{animation-delay:.05s;}
.date-label{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-soft);margin-bottom:8px;text-align:center;}
.counter-display{font-family:'DM Serif Display',serif;font-size:clamp(5rem,22vw,8rem);text-align:center;line-height:1;color:var(--ink);min-height:100px;display:flex;align-items:center;justify-content:center;}
.counter-display.bump{animation:bump .25s cubic-bezier(.36,.07,.19,.97) both;}
.counter-display.shake{animation:shake .4s cubic-bezier(.36,.07,.19,.97) both;}
.total-pill{display:flex;align-items:center;justify-content:center;gap:6px;margin:12px auto 0;padding:6px 16px;background:var(--accent-light);border-radius:99px;width:fit-content;}
.total-pill span:first-child{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--accent);}
.total-num{font-family:'DM Mono',monospace;font-size:.85rem;font-weight:500;color:var(--accent);}
.tap-wrap{display:flex;justify-content:center;margin:32px 0 24px;position:relative;}
.pulse-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:110px;height:110px;border-radius:50%;background:var(--accent);opacity:0;pointer-events:none;animation:pulse-idle 2.5s ease-in-out infinite;}
.tap-btn{width:96px;height:96px;border-radius:50%;border:none;background:linear-gradient(145deg,var(--accent),#c94030);color:#fff;font-size:2.4rem;cursor:pointer;position:relative;z-index:1;box-shadow:0 8px 24px rgba(232,93,74,.38);transition:transform .12s ease,box-shadow .12s ease;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.tap-btn:active{transform:scale(.93);box-shadow:0 4px 12px rgba(232,93,74,.3);}
.tap-btn.pop{animation:pop .25s cubic-bezier(.36,.07,.19,.97) both;}
.reset-btn{display:block;width:100%;padding:12px;border:1.5px solid var(--border);border-radius:12px;background:transparent;color:var(--ink-soft);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .2s;touch-action:manipulation;}
.reset-btn:active{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.history-card{animation-delay:.15s;}
.section-title{font-family:'DM Serif Display',serif;font-size:1.25rem;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.history-empty{text-align:center;color:var(--ink-soft);font-size:.85rem;padding:20px 0;font-style:italic;}
.history-list{display:flex;flex-direction:column;gap:6px;}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;background:var(--bg);border:1px solid var(--border);animation:fadeUp .3s ease both;}
.history-row.today-row{background:linear-gradient(135deg,#fff8f7,#fff0ee);border-color:rgba(232,93,74,.25);}
.h-date{font-size:.8rem;font-weight:500;color:var(--ink-soft);font-family:'DM Mono',monospace;}
.today-row .h-date{color:var(--accent);}
.h-right{display:flex;align-items:center;gap:8px;}
.today-badge{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);background:var(--accent-light);padding:2px 8px;border-radius:99px;border:1px solid rgba(232,93,74,.2);}
.h-count{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--ink);}
.today-row .h-count{color:var(--accent);}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-radius:12px;background:var(--ink);margin-top:10px;}
.total-row .h-date{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.6);}
.total-row .h-count{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--gold);}
.clear-btn{display:block;width:100%;max-width:420px;margin:0 auto;padding:13px;border:1.5px solid #ddd;border-radius:12px;background:var(--card);color:#999;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;animation:fadeUp .5s ease .25s both;touch-action:manipulation;}
.clear-btn:active{border-color:#e04040;color:#e04040;background:#fff5f5;}
#modalOverlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,.45);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.modal-box{background:#fff;border-radius:20px;padding:28px 24px;max-width:320px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:fadeUp .2s ease both;}
#modalIcon{font-size:2rem;text-align:center;margin-bottom:12px;}
#modalMsg{font-size:.95rem;color:var(--ink);text-align:center;line-height:1.5;margin-bottom:24px;white-space:pre-line;}
.modal-btns{display:flex;gap:10px;}
#modalCancel{flex:1;padding:11px;border:1.5px solid var(--border);border-radius:10px;background:transparent;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;color:var(--ink-soft);}
#modalConfirm{flex:1;padding:11px;border:none;border-radius:10px;background:var(--accent);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;color:#fff;}
#installBanner{display:none;position:fixed;bottom:16px;left:16px;right:16px;background:var(--ink);color:#fff;border-radius:16px;padding:14px 16px;z-index:200;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.25);animation:slideUp .35s cubic-bezier(.34,1.56,.64,1) both;max-width:420px;margin:0 auto;}
#installBanner.show{display:flex;}
.ib-icon{font-size:1.6rem;flex-shrink:0;}
.ib-text{flex:1;}
.ib-text strong{display:block;font-size:.9rem;margin-bottom:2px;}
.ib-text span{font-size:.75rem;color:rgba(255,255,255,.6);}
#installBtn{background:var(--accent);border:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;padding:8px 14px;border-radius:10px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
#dismissBtn{background:none;border:none;color:rgba(255,255,255,.5);font-size:1.2rem;cursor:pointer;padding:0 4px;flex-shrink:0;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.14)}100%{transform:scale(1)}}
@keyframes pop{0%{transform:scale(1)}35%{transform:scale(.88)}70%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes pulse-idle{0%{opacity:0;transform:translate(-50%,-50%) scale(.9)}50%{opacity:.12;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.4)}}
</style>
</head>
<body>
<header><h1>Tally</h1><p>Your daily count keeper</p></header>
<div class="card counter-card">
  <div class="date-label" id="dateLabel">Today</div>
  <div class="counter-display" id="counterDisplay">0</div>
  <div class="total-pill"><span>All-time</span><span class="total-num" id="totalDisplay">0</span></div>
  <div class="tap-wrap"><div class="pulse-ring"></div><button class="tap-btn" id="tapBtn">+</button></div>
  <button class="reset-btn" id="resetBtn">↺ Reset Today</button>
</div>
<div class="card history-card">
  <div class="section-title"><span>📅</span> History</div>
  <div id="historyContainer"><div class="history-empty">No history yet — start tapping!</div></div>
</div>
<div id="modalOverlay">
  <div class="modal-box">
    <div id="modalIcon">⚠️</div>
    <div id="modalMsg"></div>
    <div class="modal-btns"><button id="modalCancel">Cancel</button><button id="modalConfirm">Confirm</button></div>
  </div>
</div>
<button class="clear-btn" id="clearBtn">🗑 Clear All History</button>
<div id="installBanner">
  <div class="ib-icon">📲</div>
  <div class="ib-text"><strong>Install Tally App</strong><span>Add to home screen for offline use</span></div>
  <button id="installBtn">Install</button>
  <button id="dismissBtn">✕</button>
</div>
<script>
const SK='tally_history_v1',TK='tally_total_v1';
const todayStr=()=>new Date().toLocaleDateString('en-CA');
const formatDate=s=>{const[y,m,d]=s.split('-');return new Date(+y,+m-1,+d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});};
const loadH=()=>{try{return JSON.parse(localStorage.getItem(SK))||{};}catch{return{};}};
const saveH=h=>localStorage.setItem(SK,JSON.stringify(h));
const loadT=()=>parseInt(localStorage.getItem(TK))||0;
const saveT=t=>localStorage.setItem(TK,t);
let tally=loadH(),total=loadT();
const today=todayStr();
if(!tally[today])tally[today]=0;
const $=id=>document.getElementById(id);
const counterEl=$('counterDisplay'),totalEl=$('totalDisplay'),dateLabel=$('dateLabel');
const tapBtn=$('tapBtn'),resetBtn=$('resetBtn'),clearBtn=$('clearBtn'),historyBox=$('historyContainer');
const overlay=$('modalOverlay'),modalMsg=$('modalMsg'),modalIcon=$('modalIcon');
const modalConfirm=$('modalConfirm'),modalCancel=$('modalCancel');
dateLabel.textContent=formatDate(today);
function render(){counterEl.textContent=tally[today];totalEl.textContent=total.toLocaleString();renderHistory();}
function renderHistory(){
  const entries=Object.entries(tally).sort((a,b)=>b[0].localeCompare(a[0]));
  if(!entries.length){historyBox.innerHTML='<div class="history-empty">No history yet — start tapping!</div>';return;}
  let html='<div class="history-list">';
  entries.forEach(([date,count],i)=>{
    const isToday=date===today;
    html+=`<div class="history-row ${isToday?'today-row':''}" style="animation-delay:${i*.04}s">
      <span class="h-date">${formatDate(date)}</span>
      <div class="h-right">${isToday?'<span class="today-badge">Today</span>':''}<span class="h-count">${count.toLocaleString()}</span></div>
    </div>`;
  });
  html+=`<div class="total-row"><span class="h-date">All-time Total</span><span class="h-count">${total.toLocaleString()}</span></div></div>`;
  historyBox.innerHTML=html;
}
function showModal(icon,msg,onOk){
  modalIcon.textContent=icon;modalMsg.textContent=msg;overlay.style.display='flex';
  const close=()=>{overlay.style.display='none';};
  modalConfirm.onclick=()=>{close();onOk();};
  modalCancel.onclick=close;
  overlay.onclick=e=>{if(e.target===overlay)close();};
}
tapBtn.addEventListener('click',()=>{
  tally[today]++;total++;saveH(tally);saveT(total);
  counterEl.classList.remove('bump');void counterEl.offsetWidth;counterEl.classList.add('bump');
  tapBtn.classList.remove('pop');void tapBtn.offsetWidth;tapBtn.classList.add('pop');
  if(navigator.vibrate)navigator.vibrate(18);
  render();
});
resetBtn.addEventListener('click',()=>{
  if(tally[today]===0){counterEl.classList.remove('shake');void counterEl.offsetWidth;counterEl.classList.add('shake');return;}
  showModal('↺',`Reset today's count (${tally[today]})?\nAll-time total will stay.`,()=>{tally[today]=0;saveH(tally);render();});
});
clearBtn.addEventListener('click',()=>{
  showModal('🗑','Clear all history and reset the total?\nThis cannot be undone.',()=>{tally={[today]:0};total=0;saveH(tally);saveT(total);render();});
});
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(console.error);
let deferredPrompt=null;
const banner=$('installBanner'),installB=$('installBtn'),dismissB=$('dismissBtn');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;banner.classList.add('show');});
installB.addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;deferredPrompt=null;banner.classList.remove('show');});
dismissB.addEventListener('click',()=>banner.classList.remove('show'));
window.addEventListener('appinstalled',()=>banner.classList.remove('show'));
render();
</script>
</body>
</html>
